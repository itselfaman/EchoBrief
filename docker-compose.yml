version: "3.9"

services:
  # ── Redis — Message Broker for Dramatiq ────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: echobrief_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── PostgreSQL — Optional local DB (use Supabase in production) ────────────
  postgres:
    image: postgres:16-alpine
    container_name: echobrief_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: echobrief
      POSTGRES_PASSWORD: echobrief_dev_password
      POSTGRES_DB: echobrief
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U echobrief"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis Commander — Web UI for Redis inspection ──────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: echobrief_redis_ui
    ports:
      - "8081:8081"
    environment:
      REDIS_HOSTS: local:redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    profiles: ["debug"]  # only starts with: docker compose --profile debug up

volumes:
  redis_data:
  postgres_data:
